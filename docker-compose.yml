version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: roastive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: roastive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - roastive_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  roastive_pgdata:

